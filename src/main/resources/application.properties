# Project Identity
spring.application.name=prop-alert-india

# ---------------------------------------------------------
# INFRASTRUCTURE LAYER: PostgreSQL Connection
# ---------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/propalert_crm
spring.datasource.username=admin
spring.datasource.password=password123
# Explicitly defining the driver to solve the 'Hikari' error
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------------------------------------
# PERSISTENCE STRATEGY (Hibernate)
# ---------------------------------------------------------
# 'update' is for dev only; we switch to Flyway in Sprint 1.2
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---------------------------------------------------------
# MODERN DEFAULTS (Spring Boot 4.x)
# ---------------------------------------------------------
# Encourages strict adherence to Jakarta standards
spring.jpa.open-in-view=false