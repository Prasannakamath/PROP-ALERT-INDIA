openapi: 3.0.3
info:
  title: Prop-Alert India API
  version: 1.0.0
paths:
  /health:
    get:
      summary: System health check
      responses:
        "200":
          description: OK
  /leads:
    post:
      summary: Create a new property lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadRequest"
      responses:
        "201":
          description: Lead created
  /brokers:
    post:
      summary: Onboard a new Broker
      operationId: onboardBroker
      tags:
        - Broker
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrokerRequest"
      responses:
        "201":
          description: Broker created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  brokerId:
                    type: string
                    example: "MH-PUN-KMT-9876"
        "400":
          description: Invalid input

components:
  schemas:
    LeadRequest:
      type: object
      required:
        - customerName
        - phoneNumber
      properties:
        customerName:
          type: string
        phoneNumber:
          type: string
        propertyInterest:
          type: string
    BrokerRequest:
      type: object
      required:
        - organizationName
        - contactEmail
        - mobileNumber
        - city
        - state
      properties:
        organizationName:
          type: string
          example: "Kamath Properties"
        contactEmail:
          type: string
          format: email
          example: "contact@kamathprop.com"
        mobileNumber:
          type: string
          pattern: "^[0-9]{10}$"
          example: "9876543210"
          description: "Must be exactly 10 digits"
        city:
          type: string
          example: "Pune"
        state:
          type: string
          example: "Maharashtra"
