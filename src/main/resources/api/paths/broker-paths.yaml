post:
  summary: Onboard a new Broker
  operationId: onboardBroker
  tags:
    - Broker
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/broker-schemas.yaml#/components/schemas/BrokerRequest'
  responses:
    "201":
      description: Broker created successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              brokerId:
                type: string
                example: "MH-PUN-KMT-9876"
    "400":
      description: Invalid input
