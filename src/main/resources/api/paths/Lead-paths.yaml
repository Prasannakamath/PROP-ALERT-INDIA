post:
  summary: Register a new property Lead
  operationId: registerLead
  tags:
    - Lead
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/lead-schemas.yaml#/components/schemas/LeadRequest'
  responses:
    "201":
      description: Lead registered successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              leadId:
                type: string
                example: "LD-MH-MUM-3210"
    "400":
      description: Invalid input
